name: synthetic_plan_base
output_root: results
data:
  manifold: circle
  n_samples: 450
  ambient_dim: 5
  noise_std: 0.08
  seed: 123
graph:
  epsilon: 1.0
  epsilon_grid: [0.5, 0.8, 1.0, 1.4, 2.0]
  use_knn: false
  knn_k: 20
  sparse_threshold_n: 1200
spectral:
  n_eigs: 20
  diffusion_time: 1
  alpha: 0.5
cutoff:
  method: bandwidth_stability
  eigengap_min_k: 1
  eigengap_max_k: 12
  stability_min_k: 1
  stability_max_k: 12
  stability_threshold: 0.9
plot:
  dpi: 160
  formats: [png, svg]
