name: eigengap_ambiguous_suite
output_root: results
base_config: synthetic_plan_base.yaml
seeds: [7, 8, 9]
cases:
  - name: eigengap_ambiguous
    overrides:
      data:
        manifold: sphere
        ambient_dim: 6
        noise_std: 0.14
      graph:
        epsilon: 1.0
        epsilon_grid: [0.85, 1.0, 1.15]
      spectral:
        n_eigs: 24
      cutoff:
        method: eigengap
        eigengap_max_k: 14
        stability_max_k: 14
  - name: stability_ambiguous
    overrides:
      data:
        manifold: sphere
        ambient_dim: 6
        noise_std: 0.14
      graph:
        epsilon: 1.0
        epsilon_grid: [0.6, 0.8, 1.0, 1.3, 1.7, 2.2]
      spectral:
        n_eigs: 24
      cutoff:
        method: bandwidth_stability
        eigengap_max_k: 14
        stability_max_k: 14
        stability_threshold: 0.9
